name: Shop
version: 1.0.0
main: pl.konrad.vipshop.VipShop
api-version: '1.20'
authors: [konrad]
description: Advanced Economy Auditor and Custom Items VIP Shop.
depend: [Vault]
commands:
  shop:
    description: Otwiera sklep.
    aliases: [sklep_vip, sklepvip, vipshop]
    usage: /shop
  unfreeze:
    description: Odmraza zablokowanego gracza przez Audytora.
    usage: /unfreeze <nick>
    permission: vipshop.admin.unfreeze
permissions:
  vipshop.use:
    description: Zezwala na użycie sklepu VIP.
    default: true
  vipshop.admin.alerts:
    description: Zezwala na otrzymywanie alertów o anomaliach ekonomicznych.
    default: op
