# ==========================================
# VipShop Config
# ==========================================

# Configuration for the Economy Auditor (Anti-Dupe & Anti-Cheat)
auditor:
  enabled: true
  # Wealth spike settings
  wealth-spike-threshold: 100000.0  # Max money a player can gain in X minutes
  wealth-spike-time-minutes: 5      # Audit window size in minutes
  
  # Item drop audit settings
  drop-valuable-threshold: 64       # Max valuable items dropped in X minutes
  drop-valuable-time-minutes: 1     # Audit window size in minutes
  
  # List of materials monitored for drop counts
  valuable-materials:
    - DIAMOND
    - DIAMOND_BLOCK
    - NETHERITE_INGOT
    - NETHERITE_BLOCK
    - GOLD_INGOT
    - GOLD_BLOCK
    - EMERALD
    - EMERALD_BLOCK
    - BEACON
    - SHULKER_BOX

