# ==========================================
# Shop Config (Version 26.1.2)
# ==========================================

# Configuration for the Economy Auditor (Anti-Dupe & Anti-Cheat)
auditor:
  enabled: true
  # Wealth spike settings
  wealth-spike-threshold: 100000.0  # Max money a player can gain in X minutes
  wealth-spike-time-minutes: 5      # Audit window size in minutes
  
  # Item drop audit settings
  drop-valuable-threshold: 64       # Max valuable items dropped in X minutes
  drop-valuable-time-minutes: 1     # Audit window size in minutes
  
  # List of materials monitored for drop counts
  valuable-materials:
    - DIAMOND
    - DIAMOND_BLOCK
    - NETHERITE_INGOT
    - NETHERITE_BLOCK
    - GOLD_INGOT
    - GOLD_BLOCK
    - EMERALD
    - EMERALD_BLOCK
    - BEACON
    - SHULKER_BOX

# ==========================================
# Dynamic Pricing Economy Shop Configuration
# ==========================================
dynamic-shop:
  # Dynamic pricing parameters
  pricing:
    min-price-drop: 0.20        # Price drops by at least 20% once limit is crossed (0.20)
    max-price-drop: 0.60        # Price drops by at most 60% due to extreme supply (0.60)
    decay-rate-per-minute: 0.98 # Every minute, sales count decays by 2% (multiplied by 0.98)
    min-sales-to-drop: 64       # First stack (64 items) has no price drop (grace limit)

