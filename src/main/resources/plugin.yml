name: LegitCheck
version: '1.0.0'
main: pl.lukas.legitcheck.LegitCheckPlugin
api-version: '1.21'
description: A plugin to check players for cheats with automatic freezes, custom chat, and GUI actions.
author: Lukas

commands:
  check:
    description: Main command to check players.
    usage: /check <player|setloc|clean|reload>
    aliases: [sprawdz]

permissions:
  legitcheck.use:
    description: Allows staff to use the check command and open the GUI.
    default: op
  legitcheck.notify:
    description: Allows staff to see chat messages from players being checked.
    default: op
