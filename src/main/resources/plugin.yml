name: ReputationPlugin
version: '1.0.0'
main: pl.lukas.reputation.ReputationPlugin
api-version: '1.21'
description: Zaawansowany system reputacji graczy dla serwera Paper.
author: Lukas

commands:
  reputation:
    description: Main command of the reputation system.
    usage: /reputation [check/set/reload]
    aliases: [rep]
  rep+:
    description: Give positive reputation (+0.5) to a player.
    usage: /rep+ <player>
    aliases: [rep+give]
  rep-:
    description: Give negative reputation (-0.5) to a player.
    usage: /rep- <player>
    aliases: [rep-give]

permissions:
  reputation.admin:
    description: Pozwala na korzystanie z komend administratora systemu reputacji.
    default: op
